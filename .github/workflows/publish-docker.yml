name: Publish Docker Image

on:
  workflow_run:
    workflows:
      - "Release on Tag"
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g., v1.0.0)'
        required: true
        type: string

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  publish-docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Only run when the Release workflow succeeded AND was triggered by a semver tag (v*.*.*)
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && startsWith(github.event.workflow_run.head_branch, 'v'))

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          # Check out the exact version tag. The job-level 'if' already
          # ensures head_branch is a v*.*.* tag (trusted maintainer ref).
          ref: refs/tags/${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          # Use the head_branch from the triggering workflow_run event as the primary
          # source of truth (it is the git tag that triggered "Release on Tag").
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.workflow_run.head_branch }}"

          # Cross-check: if a semver tag points at HEAD, prefer that (handles edge
          # cases where head_branch contains unexpected values).
          GIT_TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]' | sort -V | tail -1)
          if [ -n "${GIT_TAG}" ]; then
            TAG="${GIT_TAG}"
          fi

          # Strip the leading 'v' prefix (e.g. v1.2.3 → 1.2.3)
          VERSION="${TAG#v}"

          # Validate: version must be a non-empty semver string (X.Y.Z[...]).
          # If it is empty or malformed the build would silently push only the
          # "latest" tag with an invalid/empty version tag – fail loudly instead.
          if ! echo "${VERSION}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]'; then
            echo "::error::Could not determine a valid semver version from tag '${TAG}'." \
              "Expected format: v<MAJOR>.<MINOR>.<PATCH>. Aborting to prevent pushing" \
              "an untagged image."
            exit 1
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected version: ${VERSION} (from tag: ${TAG})"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./docker/bunny-agent-claude
          file: ./docker/bunny-agent-claude/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            RUNNER_CLI_VERSION=${{ steps.version.outputs.version }}
          tags: |
            vikadata/bunny-agent:${{ steps.version.outputs.version }}
            vikadata/bunny-agent:latest

      - name: Write job summary
        if: always()
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          DIGEST="${{ steps.build.outputs.digest }}"
          STATUS="${{ steps.build.outcome }}"

          if [ "$STATUS" = "success" ]; then
            STATUS_ICON="✅"
          else
            STATUS_ICON="❌"
          fi

          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## ${STATUS_ICON} Docker Image Published

          | Field      | Value |
          |------------|-------|
          | **Image**  | \`vikadata/bunny-agent\` |
          | **Version tag** | [\`${VERSION}\`](https://hub.docker.com/r/vikadata/bunny-agent/tags?name=${VERSION}) |
          | **Latest tag**  | [\`latest\`](https://hub.docker.com/r/vikadata/bunny-agent/tags?name=latest) |
          | **Git tag** | \`${TAG}\` |
          | **Platforms** | \`linux/amd64\`, \`linux/arm64\` |
          | **Digest** | \`${DIGEST}\` |
          | **Status** | ${STATUS_ICON} \`${STATUS}\` |

          ### Pull the image

          \`\`\`bash
          docker pull vikadata/bunny-agent:${VERSION}
          # or
          docker pull vikadata/bunny-agent:latest
          \`\`\`
          EOF
